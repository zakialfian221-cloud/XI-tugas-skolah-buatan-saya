<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG KIY | PUSAT KENDALI XI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Mono:wght@400;700&display=swap');
        :root { --neon: #00f2ff; --gold: #ffcc00; --bg: #020202; }
        
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; padding: 10px; overflow: hidden; }
        
        /* OVERLAY MASUK */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 999; flex-direction: column;
        }
        .start-btn {
            padding: 20px 40px; border: 2px solid var(--neon); color: var(--neon);
            background: transparent; font-family: 'Audiowide'; cursor: pointer;
            letter-spacing: 5px; box-shadow: 0 0 20px rgba(0,242,255,0.3);
        }

        .container { max-width: 480px; margin: auto; border: 1px solid #111; padding: 10px; display: none; }
        .vip-top { border: 2px solid var(--neon); padding: 20px; background: rgba(0,0,0,0.8); clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%); }
        h1 { font-family: 'Audiowide'; font-size: 22px; color: var(--neon); margin: 0; }
        .monitor-panel { margin-top: 20px; border: 1px solid #222; background: #080808; padding: 15px; }
        .tag { background: var(--neon); color: #000; padding: 2px 10px; font-size: 10px; font-weight: bold; display: inline-block; }
        .line { border-bottom: 1px solid #1a1a1a; padding: 10px 0; display: flex; justify-content: space-between; font-size: 13px; }
        .val { color: #fff; font-weight: bold; text-shadow: 0 0 5px var(--neon); }
        .btn-connect { display: block; width: 100%; margin-top: 25px; padding: 20px; border: 1px solid var(--gold); color: var(--gold); text-align: center; text-decoration: none; font-weight: bold; box-sizing: border-box;}
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startSystem()">MASUK SISTEM</button>
        <p style="color: #444; margin-top: 15px; font-size: 10px;">[ KLIK UNTUK OTENTIKASI ]</p>
    </div>

    <div class="container" id="main-content">
        <div class="vip-top">
            <h1>PUSAT KENDALI</h1>
            <p style="color:var(--gold); font-size: 10px;">IDENTITAS: <span style="text-shadow: 0 0 10px var(--neon); color:var(--neon);">BG KIY</span> [KOMISARIS]</p>
        </div>

        <div class="monitor-panel">
            <span class="tag">OPERASI HARIAN KELAS XI</span>
            <div class="line"><span>07:15 - 08:45</span> <span class="val">MATEMATIKA</span></div>
            <div class="line"><span>09:00 - 10:30</span> <span class="val">B. INGGRIS</span></div>
            <div class="line"><span>11:00 - 12:30</span> <span class="val" style="color:var(--gold)">B. ARAB</span></div>
        </div>

        <div class="monitor-panel">
            <span class="tag">ASET & PERSONEL</span>
            <div class="line"><span>SALDO KAS:</span> <span class="val">RP 520.000</span></div>
            <div class="line"><span>PETUGAS PIKET:</span> <span class="val">BG KIY, MAYA, EKO</span></div>
        </div>

        <a href="https://wa.me/6283147684295?text=Lapor+BG+KIY" class="btn-connect">HUBUNGI BG KIY</a>
    </div>

    <audio id="hacker-sound" src="https://www.soundjay.com/buttons/sounds/Splash.mp3"></audio>

    <script>
    function startSystem() {
        // 1. Panggil Audio
        var audio = document.getElementById("hacker-sound");
        
        // 2. Paksa Audio Bunyi (Volume Full)
        audio.volume = 1.0;
        audio.play().catch(function(error) {
            console.log("Browser blokir suara, tapi dashboard tetep buka.");
        });
        
        // 3. Langsung Tampilkan Konten
        document.getElementById("overlay").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        
        // 4. Biar Layar Bisa Di-scroll
        document.body.style.overflow = "auto";
    }
    </script>
</body>
</html>
